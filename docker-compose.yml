version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: indusmind-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Madhanreddy@123
      MYSQL_DATABASE: indusmind
      MYSQL_USER: indusmind
      MYSQL_PASSWORD: Madhanreddy@123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - indusmind-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pMadhanreddy@123"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.14
    container_name: indusmind-neo4j
    environment:
      NEO4J_AUTH: neo4j/indusmind123
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - indusmind-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: indusmind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - indusmind-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: indusmind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - indusmind-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: indusmind-backend
    environment:
      MYSQL_URL: mysql+pymysql://root:[REDACTED]@123@mysql:3306/indusmind
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: indusmind123
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      HOST: 0.0.0.0
      PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - indusmind-network
    depends_on:
      - mysql
      - neo4j
      - qdrant
      - minio
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: indusmind-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    networks:
      - indusmind-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  indusmind-network:
    driver: bridge

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  minio_data:
  backend_logs:
